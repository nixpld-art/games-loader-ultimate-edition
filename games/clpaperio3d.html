<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Paper.io 3D</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111615;
      font-family: Arial, Helvetica, sans-serif;
    }

    #gameFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #111615;
    }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      background: #111615;
      color: #fff;
      transition: opacity 180ms ease, visibility 180ms ease;
    }

    #loader.hidden {
      visibility: hidden;
      opacity: 0;
      pointer-events: none;
    }

    .panel {
      display: grid;
      gap: 18px;
      justify-items: center;
      width: min(320px, calc(100vw - 40px));
      text-align: center;
    }

    .logo {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.1;
    }

    .spinner {
      width: 46px;
      height: 46px;
      border: 5px solid rgba(255, 255, 255, 0.22);
      border-top-color: #4fe56d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .status {
      min-height: 20px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
    }

    .actions {
      display: none;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      min-height: 42px;
      padding: 0 16px;
      border: 0;
      border-radius: 6px;
      background: #4fe56d;
      color: #07130a;
      font: 700 14px Arial, Helvetica, sans-serif;
      cursor: pointer;
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.16);
      color: #fff;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <iframe
    id="gameFrame"
    title="Paper.io 3D"
    src="https://paperio.site/3d/"
    allow="autoplay; fullscreen; gamepad; pointer-lock"
    allowfullscreen>
  </iframe>

  <div id="loader" aria-live="polite">
    <div class="panel">
      <div class="logo">Paper.io 3D</div>
      <div class="spinner" aria-hidden="true"></div>
      <div id="status" class="status">Fixed by @ThatGuy On discord</div>
      <div id="actions" class="actions">
        <button id="openGame" type="button">Open Game</button>
        <button id="reloadGame" class="secondary" type="button">Reload</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var frame = document.getElementById("gameFrame");
      var loader = document.getElementById("loader");
      var status = document.getElementById("status");
      var actions = document.getElementById("actions");
      var openGame = document.getElementById("openGame");
      var reloadGame = document.getElementById("reloadGame");
      var gameUrl = "https://paperio.site/3d/";

      var fallbackTimer = window.setTimeout(function () {
        status.textContent = "Fixed by @ThatGuy On discord";
        actions.style.display = "flex";
      }, 8000);

      frame.addEventListener("load", function () {
        window.clearTimeout(fallbackTimer);
        window.setTimeout(function () {
          loader.classList.add("hidden");
        }, 700);
      });

      openGame.addEventListener("click", function () {
        window.location.href = gameUrl;
      });

      reloadGame.addEventListener("click", function () {
        actions.style.display = "none";
        status.textContent = "Fixed by @ThatGuy On discord";
        frame.src = gameUrl + "?reload=" + Date.now();
      });
    }());
  </script>
</body>
</html>
