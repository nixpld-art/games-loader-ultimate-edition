<html lang="en">
  <html>
    <head>
      
      
      <title>Game title</title>
      <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/7DatsonBack/3kh0-Assets@60f2f97b00ffe9566ee06c82ecaf67255931118b/Run%202/waflash/waflash-style.css" type="text/css">
      
        <script type="module" crossorigin="anonymous">
          let is_mobile = /Mobi/i.test(window.navigator.userAgent);
          if (is_mobile) {
            function scrollToSubject() {
              try {
                window.scrollTo({
                  top: 100,
                  left: 0,
                  behavior: 'smooth'
                });
              } catch (e) {}
            }
            scrollToSubject();
            window.addEventListener("orientationchange", function() {
              setTimeout(scrollToSubject, 100);
            });
          } else {
            document.getElementById('canvas').focus();
          }
          document.getElementById('canvas').addEventListener("keydown", function(ev) {
            ev.preventDefault();
            ev.stopPropagation();
          });
          document.getElementById('canvas').addEventListener("click", function() {
            document.getElementById('canvas').focus();
          });
          document.addEventListener("mousedown", (function() {
            const canvasElement = document.getElementById('canvas');
            let focused = false;
            return function(ev) {
              if (ev.target == canvasElement) {
                if (!focused) {
                  canvasElement.focus();
                  focused = true;
                }
              } else {
                if (focused) {
                  focused = false;
                }
              }
              return true;
            }
          })());
          import {
            createWaflash
          } from 'https://cdn.jsdelivr.net/gh/zhit73/wafedit@183cb00916e4d250ae5bc9813864f9a70cb9986b/wasm/waflash-player.min.js';
          createWaflash(gameConfig.swfUrl, window.wafOptions || {});
        </script>
      </div>
      <script src=""></script>
    </body>
  </html>
